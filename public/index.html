<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mom and Pop — Login</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <div class="login-logo">
        <h1>🏪 Mom and Pop</h1>
        <p>Store Management System</p>
      </div>
      <div id="error-msg" class="alert alert-error" style="display:none"></div>
      <form id="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input class="form-control" type="text" id="username" placeholder="Enter username" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input class="form-control" type="password" id="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;padding:12px;">
          Login
        </button>
      </form>
    </div>
  </div>
  <script>
    // Redirect if already logged in
    fetch('/api/auth/me', { credentials: 'same-origin' })
      .then(r => r.ok ? location.href = 'dashboard.html' : null)
      .catch(() => {});

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        location.href = 'dashboard.html';
      } catch (err) {
        errEl.textContent = err.message || 'Login failed';
        errEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
